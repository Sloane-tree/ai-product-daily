<script>
var reports = [{"date": "2026-07-07", "html": "<h1>🤖 AI Builder Daily</h1>\n<p><strong>2026年7月7日</strong></p>\n<blockquote>\n<p>今日追踪 18 位 builder，5 轮 grill 后精选 8 条 | 阅读约 15 分钟</p>\n</blockquote>\n<hr />\n<h2>🔥 Today's Signals</h2>\n<h3>1. Sam Altman 对程序员说了句\"谢谢带我们走到这里\"——GPT-5.6 三兄弟发布，但被政府限流</h3>\n<p><strong>Insight</strong>：没人期待 Sam Altman 会对程序员说\"谢谢\"。但他在 GPT-5.6（Sol/Terra/Luna 三档模型）发布后确实说了——\"我已经很难记起一行行手写代码曾经有多费劲，感谢你们把我们带到这里。\"这不是礼貌，是一个时代的句号。同时他承认之前对\"AI 吞噬就业\"的判断错了——\"我们低估了把人放在中心的能力。\"</p>\n<p><strong>落地过程</strong>：GPT-5.6 的三个版本按能力定价——Sol 是旗舰（$5/百万 token），Luna 是廉价版（$1/百万 token）。但关键不是产品本身，是发布方式——美国政府要求只对 20 个\"受信机构\"开放预览。Altman 说这是\"坏消息\"，但也公开支持建立一个类似 IAEA 的国际 AI 监管机构。同一个 CEO，一边说政府限流是坏消息，一边呼吁更多监管——这个矛盾本身就是产品经理需要理解的行业现状。</p>\n<p><strong>对我的启发</strong>：Altman 说的\"低估了把人放在中心的能力\"值得认真对待。AI 时代 PM 的核心价值不是\"管需求\"——是把人（用户、团队、社会）放在产品决策的中心。机器越强，人的判断力越稀缺。</p>\n<blockquote>\n<p>📎 <a target=\"_blank\" rel=\"noopener\" href=\"https://x.com/sama\">@sama</a> · <a target=\"_blank\" rel=\"noopener\" href=\"https://ca.finance.yahoo.com/news/sam-altman-wants-global-referee-105253202.html\">Yahoo Finance</a> · <a target=\"_blank\" rel=\"noopener\" href=\"https://www.techradar.com/pro/quote-of-the-day-by-openai-ceo-sam-altman-one-of-the-tech-industrys-worst-mistakes-in-a-long-time-was-that-everybody-could-go-full-remote-forever-closing-the-door-to-pandemic-era-flexibility\">TechRadar</a></p>\n</blockquote>\n<hr />\n<h3>2. Swyx：编程 Agent 正在\"突破封锁\"——今年所有知识工作者都会被冲击</h3>\n<p><strong>Insight</strong>：Swyx（Latent Space 播客主理人、AI Engineer 大会创始人）提出了一个锋利的判断——2026 年的年度主题是 coding agents \"breaking containment\"（突破封锁）。Agent 的能力正在从写代码溢出到所有知识工作领域，不只是程序员的事。他的证据：Sam Altman 同一天发推让用户用 Codex 处理非编程的日常电脑工作。</p>\n<p><strong>落地过程</strong>：Swyx 的 AI Engineer 社区每月免费服务 100 万开发者，但团队极其精简。他们把 agent 用在所有事务上——内容管理、活动筹备（甚至租充气龙虾）、日常运营。关键不是用什么工具（他用 OpenClaw，团队用 Devin），而是有没有把 agent 融入知识工作的每一个环节。他对\"大多数人还只把 agent 当编程助手\"的评价是：远远不够努力。</p>\n<p><strong>对我的启发</strong>：一个计算机系大四学生评论说\"程序员不是第一批被替代的人，我们是金丝雀\"——金丝雀在矿井里先晕倒，警告所有人危险来了。如果你的日常工作里有任何重复性的知识处理（写文档、整理信息、做竞品分析），现在是时候试一下用 agent 替代这些环节，而不是继续手动做。</p>\n<blockquote>\n<p>📎 <a target=\"_blank\" rel=\"noopener\" href=\"https://x.com/swyx\">@swyx</a> · <a target=\"_blank\" rel=\"noopener\" href=\"https://www.latent.space/\">Latent Space 播客</a></p>\n</blockquote>\n<hr />\n<h3>3. 小红书 RED Skill 正式上线——归藏的社媒卡片 3000+ 人用，\"内容种草→Skill 分发\"闭环跑通了</h3>\n<p><strong>Insight</strong>：小红书不只是种草平台了。RED Skill 6 月正式上线，16 万活跃开发者、近 1000 个原创 Skill、6 亿话题曝光。归藏（op7418）的社媒卡片 Skill 从冷启动到 3000+ 用户，走了一条和传统 GitHub 开发者完全不同的路——先在小红书发笔记种草，引导用户 GitHub 下载，Skill 挂载在笔记下方一键安装。</p>\n<p><strong>落地过程</strong>：归藏的两大 Skill（PPT 1万 ⭐ + 社媒卡片）全部围绕\"内容创作者\"这个人群。他的路径是：发现小红书上内容创作者有做图的痛点 → 用 Claude Code 写成 Skill → 在小红书上发笔记展示效果 → 用户引导到 GitHub → 最终回到小红书 RED Skill 一键安装。这个闭环的关键是\"在用户消费内容的地方直接转化为 Skill 使用者\"。</p>\n<p><strong>对我的启发</strong>：GitHub star 是技术信用，小红书用户是真的在用它——两种验证完全不同。如果你在做一个 AI 工具，小红书可能是比 GitHub 更接近目标用户的分发渠道，尤其当你的用户不是开发者的时候。</p>\n<blockquote>\n<p>📎 一手：<a target=\"_blank\" rel=\"noopener\" href=\"https://github.com/op7418/guizang-social-card-skill\">归藏 GitHub</a> · 小红书搜索「歸藏」 · 二手：<a target=\"_blank\" rel=\"noopener\" href=\"https://www.qbitai.com/2026/06/433066.html\">量子位报道</a></p>\n</blockquote>\n<hr />\n<h3>4. OpenAI Codex PM 说：先做出来，再决定哪个值得发布</h3>\n<p><strong>Insight</strong>：Peter Yang 采访了 OpenAI Codex PM Rohan Varma（前 Cursor 联合创始人）。Rohan 说了一句炸裂的话：\"Build everything first, then decide what's worth releasing\"。PM 的工作流从根本上被颠覆了——以前是\"想清楚再让工程师做\"，现在是\"让 AI 先做出来看看，再决定要不要认真搞\"。</p>\n<p><strong>落地过程</strong>：Rohan 描述了他真实的工作方式——在后台开 Codex，手动做一遍任务（比如归类用户反馈），然后告诉 Codex\"把这件事自动化\"。不是写 spec 给工程师，是 PM 自己直接自动化。他还提到\"Disposable Software\"——花不到一分钟生成临时的 dashboard，用完就扔。多个 Codex 线程互相调度也在做了。</p>\n<p><strong>对我的启发</strong>：Peter Yang 最后总结的那句话：\"Model capabilities have long outstripped most people's ambitions\"（模型的能力早就超过大多数人的野心了）。PM 的价值不再是\"写得清楚\"，而是\"想得清楚什么值得做\"。另外——这周有任何你觉得\"太麻烦懒得做\"的小需求吗？试试用 AI 直接做，而不是写个 ticket 等排期。</p>\n<blockquote>\n<p>📎 <a target=\"_blank\" rel=\"noopener\" href=\"https://x.com/petergyang\">@petergyang</a> 播客 <em>Behind the Craft</em> Ep.138 · <a target=\"_blank\" rel=\"noopener\" href=\"https://www.36kr.com/p/3884773176193287\">36kr 中文解读</a></p>\n</blockquote>\n<hr />\n<h3>5. Claude Code 隐写代码事件：阿里 7/10 全球禁用，AI 工具的\"信任危机\"来了</h3>\n<p><strong>Insight</strong>：Anthropic 的 Claude Code 被发现在代码中埋了隐写检测——通过时区、代理、主机名判断用户是否来自中国，并在 system prompt 嵌入隐形标记。Thariq Shihipar（Claude Code 工程师）在 X 上承认是 3 月的\"防蒸馏实验\"。但阿里的反应很快——7 月 10 日起全球禁用，转向自研 Qoder。</p>\n<p><strong>落地过程</strong>：这件事的产品教训很残酷。Anthropic 的动机可以理解（阿里被指控 25000 个假账号、2880 万次蒸馏攻击），但偷偷跑检测代码被发现后的信任损失可能比被蒸馏更严重。Thariq 在 X 上的回应很坦诚，但坦诚是在代码被发现之后。这不是技术事故，是产品信任事故。</p>\n<p><strong>对我的启发</strong>：如果你在做面向中国市场的 AI 产品——选模型供应商时加一条\"地缘政治风险评估\"。阿里选了自研 Qoder，其他中国公司可能在观望。如果更多公司跟进，国内 AI 工具市场会出现替代需求窗口。</p>\n<blockquote>\n<p>📎 <a target=\"_blank\" rel=\"noopener\" href=\"https://x.com/trq212\">@trq212</a> · <a target=\"_blank\" rel=\"noopener\" href=\"https://www.theregister.com/ai-and-ml/2026/07/01/anthropic-is-removing-its-covert-code-for-catching-chinese-competitors/5265366/\">The Register</a> · <a target=\"_blank\" rel=\"noopener\" href=\"https://techcrunch.com/2026/07/04/alibaba-reportedly-bans-employees-from-using-claude-code/\">TechCrunch</a></p>\n</blockquote>\n<hr />\n<h3>6. Garry Tan：13 年没写代码，用 $200 和 5 天重建了 $400 万产品</h3>\n<p><strong>Insight</strong>：YC 掌门人亲自下场 vibe coding，这不是 PR——是 YC 对创始人的新基线要求。Tan 在 Naval 播客上说出\"Token Maxxing\"（每年花 $10 万买 token 比雇人便宜），本质上是在告诉所有创始人：不拥抱 AI 工具的 founder，不配拿 YC 钱。</p>\n<p><strong>落地过程</strong>：Tan 用自己开源的 GStack（100K ⭐）+ Claude Code，同时跑 15 个 Agent，48 小时内合并 13 个 PR。他的方法论总结为\"Thin Harness, Fat Skills\"——不要在框架上花时间，把时间花在写好 Skills。他把 40 万份个人文档（邮件/Slack/短信）用 AI 交叉检索做创意生成——他叫\"LSD 模式\"。</p>\n<p><strong>对我的启发</strong>：YC 选人标准已经从\"学历 pedigree\"变成了\"GitHub commits + 产品 taste\"。Tan 自己说 YC 2026 看的是\"你能不能 build 一个有防御力的 AI 产品\"。这对 PM 意味着——简历上的学校和公司名字越来越不重要，你在 GitHub 上 build 了什么才重要。</p>\n<blockquote>\n<p>📎 <a target=\"_blank\" rel=\"noopener\" href=\"https://x.com/garrytan\">@garrytan</a> · <a target=\"_blank\" rel=\"noopener\" href=\"https://podcastnotes.org/naval-periscope-sessions/riding-agi-ai-anxiety-who-funded-covid-defending-taiwan-and-california-empire-naval-podcast/\">Naval 播客</a></p>\n</blockquote>\n<hr />\n<h3>7. Vercel Skills：<code>npx skills add</code> 之后，prompt 模板没人换了</h3>\n<p><strong>Insight</strong>：Vercel CEO Guillermo Rauch 年初推了 <code>npx skills add</code>，半年后最火的 skill <code>find-skills</code> 装了 230 万次。AI 开发者社区从\"交换 prompt 模板\"进化到\"交换可复用能力包\"。这和当年 npm 取代手工复制 JS 文件的逻辑一模一样。</p>\n<p><strong>落地过程</strong>：Skills CLI 支持 68 个 AI 工具（Claude Code/Cursor/Codex/Gemini CLI...），skill 安装量直接成排行榜。Rauch 的底层哲学：\"模型和 Agent 应该解耦\"——就像 AWS 不关心你跑什么数据库，Vercel 不关心你用什么模型。</p>\n<p><strong>对我的启发</strong>：你的 GitHub 项目（tab-out、reading-block、lark-coding-agent-bridge 等）本质上都是可以被封装成 skill 的能力。发布到 skills.sh，可能通过 Agent 分发获得全新的用户触达。</p>\n<blockquote>\n<p>📎 <a target=\"_blank\" rel=\"noopener\" href=\"https://x.com/rauchg\">@rauchg</a> · <a target=\"_blank\" rel=\"noopener\" href=\"https://github.com/vercel-labs/skills\">Skills CLI GitHub</a> (24K ⭐)</p>\n</blockquote>\n<hr />\n<h3>8. Aaron Levie：AI 进入\"Context War\"，\"Agent Operator\"将是新岗位</h3>\n<p><strong>Insight</strong>：Box CEO Aaron Levie 说模型正在同质化，真正的战场是\"谁拥有更好的 context\"。Box 存储了大量企业文档，他的重新定位很简单：如果 AI 的护城河是 context，Box 就是 AI 时代的石油公司。</p>\n<p><strong>落地过程</strong>：Levie 诚实得罕见——AI Agent 对技术团队是\"最好的生产力工具\"，对业务团队是\"还是半成品\"。他提出了一个值得关注的新角色：Agent Operator——懂 MCP/CLI/Agent 配置 + 懂业务流程 + 能重新设计工作流的人。预测 50-100 万人需求。</p>\n<p><strong>对我的启发</strong>：\"Agent Operator\"的技能描述和 AI PM 高度重合。如果 Levie 是对的，AI PM 的职业路径不止一条——可以做产品，也可以做 Agent 编排。后者可能更稀缺。</p>\n<blockquote>\n<p>📎 <a target=\"_blank\" rel=\"noopener\" href=\"https://x.com/levie\">@levie</a> · <a target=\"_blank\" rel=\"noopener\" href=\"https://mastersofscale.com/how-saas-can-survive-the-ai-revolution/\">Masters of Scale 播客</a></p>\n</blockquote>\n<hr />\n<h2>💡 Today's Builder Insight</h2>\n<p><strong>Altman 对程序员说\"谢谢\"，Swyx 说 Agent 正在\"突破封锁\"——这两句话指向同一个未来。</strong></p>\n<p>Altman 说的是过去时——\"手写代码的时代结束了，谢谢你们带我到这里。\"Swyx 说的是正在进行时——\"Agent 正在溢出编程，进入所有知识工作。\"</p>\n<p>合在一起：代码生成已经 commoditized（商品化了），但 Agent 的下一个战场是\"所有重复性知识工作\"。这就是为什么 Swyx 说大多数人在这个方向上\"远远不够努力\"。</p>\n<p>对产品经理来说，这意味着两件事：第一，你自己的日常工具链（文档、分析、竞品研究）应该被 Agent 重构。第二，你做的产品里，有哪些环节是用户还在手动处理信息？那些就是你的 Agent 化机会。</p>\n<hr />\n<h2>✅ Today's Action</h2>\n<blockquote>\n<p>打开 Claude Code 或 Codex，选一个你今天本来要手动做的事（比如整理用户反馈、写竞品分析、归类信息），试着让 AI 直接做而不是你亲自动手。然后把过程和结果记下来——你正在积累自己的\"Agent 工作流\"。</p>\n</blockquote>\n<hr />\n<p><em>AI Builder Daily · 每日 08:30 更新 · Follow builders, not influencers.</em></p>\n<hr />\n<h2>📇 Builder 账号索引</h2>\n<table>\n<thead>\n<tr>\n<th>Builder</th>\n<th>X</th>\n<th>YouTube</th>\n<th>GitHub</th>\n<th>小红书</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Andrej Karpathy</td>\n<td><a target=\"_blank\" rel=\"noopener\" href=\"https://x.com/karpathy\">@karpathy</a></td>\n<td><a target=\"_blank\" rel=\"noopener\" href=\"https://youtube.com/@AndrejKarpathy\">YouTube</a></td>\n<td><a target=\"_blank\" rel=\"noopener\" href=\"https://github.com/karpathy\">GitHub</a></td>\n<td>—</td>\n</tr>\n<tr>\n<td>Swyx</td>\n<td><a target=\"_blank\" rel=\"noopener\" href=\"https://x.com/swyx\">@swyx</a></td>\n<td>—</td>\n<td><a target=\"_blank\" rel=\"noopener\" href=\"https://github.com/sw-yx\">GitHub</a></td>\n<td>—</td>\n</tr>\n<tr>\n<td>Amjad Masad</td>\n<td><a target=\"_blank\" rel=\"noopener\" href=\"https://x.com/amasad\">@amasad</a></td>\n<td>—</td>\n<td><a target=\"_blank\" rel=\"noopener\" href=\"https://github.com/amasad\">GitHub</a></td>\n<td>—</td>\n</tr>\n<tr>\n<td>Guillermo Rauch</td>\n<td><a target=\"_blank\" rel=\"noopener\" href=\"https://x.com/rauchg\">@rauchg</a></td>\n<td>—</td>\n<td><a target=\"_blank\" rel=\"noopener\" href=\"https://github.com/rauchg\">GitHub</a></td>\n<td>—</td>\n</tr>\n<tr>\n<td>Ryo Lu</td>\n<td><a target=\"_blank\" rel=\"noopener\" href=\"https://x.com/ryokun6\">@ryokun6</a></td>\n<td>—</td>\n<td><a target=\"_blank\" rel=\"noopener\" href=\"https://github.com/ryokun6\">GitHub< var currentDate = null;

function renderNav() {
    var nav = document.getElementById('nav-links');
    reports.forEach(function(r) {
        var a = document.createElement('a');
        a.href = '#';
        a.textContent = r.date;
        a.onclick = function(e) { e.preventDefault(); showReport(r.date); };
        nav.appendChild(a);
    });
}

function showReport(date) {
    var report = reports.find(function(r) { return r.date === date; });
    if (!report) return;
    currentDate = date;

    document.getElementById('content').innerHTML = report.html;

    // Highlight active nav
    var links = document.querySelectorAll('nav a');
    links.forEach(function(a) {
        a.classList.toggle('active', a.textContent === date);
    });
}

// Show latest report on load
renderNav();
if (reports.length > 0) {
    showReport(reports[0].date);
}
