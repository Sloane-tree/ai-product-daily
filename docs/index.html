<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FFFDF9;--text:#1A1816;--dim:#787570;--rule:#E8E2D6;--accent:#C9352B;--surface:#FFF}
@media(prefers-color-scheme:dark){:root{--bg:#1A1816;--text:#E8E2D4;--dim:#8A857D;--rule:#2E2B26;--accent:#E0554A;--surface:#22201C}}
body{font-family:"PingFang SC","Hiragino Sans GB",-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;display:flex;min-height:100vh}
nav{width:220px;flex-shrink:0;border-right:1px solid var(--rule);padding:28px 20px;overflow-y:auto;background:var(--surface);position:sticky;top:0;height:100vh}
nav h2{font-family:Georgia,serif;font-size:18px;margin-bottom:20px;letter-spacing:-0.3px}
nav h2 span{color:var(--accent)}
nav a{display:block;padding:6px 10px;font-size:13px;color:var(--dim);text-decoration:none;border-radius:4px;transition:all 0.15s}
nav a:hover,nav a.active{color:var(--text);background:var(--bg)}
main{flex:1;max-width:780px;padding:28px 48px 60px;overflow-y:auto}
main h1{font-family:Georgia,serif;font-size:26px;margin-bottom:6px}
main h2{font-size:19px;margin:36px 0 14px;padding-bottom:6px;border-bottom:2px solid var(--rule)}
main h3{font-size:16px;margin:24px 0 10px}
main p{margin-bottom:12px;font-size:15px}
main table{width:100%;border-collapse:collapse;margin:12px 0 20px;font-size:14px}
main td,main th{padding:8px 12px;border-bottom:1px solid var(--rule);text-align:left;vertical-align:top}
main td:first-child{font-weight:600;white-space:nowrap;color:var(--dim);width:120px}
main strong{color:var(--accent)}
main a{color:var(--accent)}
main blockquote{border-left:3px solid var(--accent);padding:12px 18px;margin:16px 0;background:var(--surface);border-radius:0 6px 6px 0;font-size:15px}
main hr{border:none;border-top:1px solid var(--rule);margin:28px 0}
main code{font-size:13px;background:var(--bg);padding:2px 6px;border-radius:3px}
main .loading{text-align:center;color:var(--dim);padding:60px 0}
@media(max-width:768px){body{flex-direction:column}nav{width:100%;height:auto;position:static;padding:16px;display:flex;gap:8px;overflow-x:auto;border-right:none;border-bottom:1px solid var(--rule)}nav h2{display:none}nav a{white-space:nowrap;font-size:12px}main{padding:20px 16px 40px}}
</style>

<script>
var reports = [{"date": "2026-07-07", "html": "<h1>🤖 AI Builder Daily</h1>\n<p><strong>2026年7月7日</strong></p>\n<blockquote>\n<p>今日追踪 24 位 builder，精选 8 条 | 阅读约 15 分钟</p>\n</blockquote>\n<hr />\n<h2>🔥 Today's Signals</h2>\n<h3>1. Karpathy 泼了盆冷水：逼 Agent 干活是 AI 最大错误</h3>\n<p><strong>Insight</strong>：Karpathy 在 Anthropic 内部分享了一个反直觉的观点——当前 AI 领域最大的错误，是人们急着让 Agent 去干活，却没先把底层模型搞明白。他搬出了自己 2016 年在 OpenAI 做的 World of Bits 项目——让 Agent 订机票、点外卖——和今天 Agent 创业公司的 PPT 第一页几乎一模一样。当时失败了，因为手里只有强化学习这把锤子。回头看，正确的做法是\"彻底忘掉 Agent，转头做语言模型\"。</p>\n<p><strong>落地过程</strong>：Karpathy 今年 5 月加入 Anthropic 预训练团队，这本身就是一记\"行为投票\"。他发明了 vibe coding 这个词，却选择回到最底层做模型。他从神经科学找灵感——Agent 里的\"海马体\"（记忆检索）、\"基底神经节\"（行为选择）、\"丘脑\"（多念头抢麦克风）——而不是从工程架构出发。同时他明确说 vibe coding 适合原型探索，但专业开发正进入 Agentic Engineering 阶段——需要更多监督和可验证交付物。</p>\n<p><strong>对我的启发</strong>：Karpathy 的核心信息不是\"别做 Agent\"，而是\"别跳过基础做 Agent\"。这对产品经理意味着——选 Agent 平台时，先评估底层模型能力，而不是看 Agent 框架的花哨功能。另外他说的\"Agent 不是产品，基础能力才是产品\"值得贴在墙上——你做的是产品，不是套壳。</p>\n<blockquote>\n<p>importance: 5 | category: Insight | source: <a target=\"_blank\" rel=\"noopener\" href=\"https://36kr.com/p/3883532611383305\">36kr</a></p>\n</blockquote>\n<hr />\n<h3>2. Replit CEO：让 Agent 自己读用户日志、找到 bug、提 PR、自己修</h3>\n<p><strong>Insight</strong>：Amjad Masad 在 SaaStr AI 2026 上分享了一个细节——Replit 内部跑了一个 Agent，每天晚上自动读取所有用户的使用 trace，发现 bug 后自己生成 prompt 修复方案、提 PR、跑 A/B test。全程无人干预。这不是 demo，是已经跑在生产环境里的东西。</p>\n<p><strong>落地过程</strong>：他们发现关键在于\"monorepo 优势\"——多个 App 跑在同一个代码库里，Agent 能拿到全局上下文，效果远好于单项目孤立运行。经济学上也成立：这套 Agent 系统每月成本 $257，替代的是年薪 $140K+ 的工程师。另外他提到 Replit 的 AI 写 B2B 外发邮件已经超过大多数人类——不是\"未来\"，是\"现在\"。</p>\n<p><strong>对我的启发</strong>：自愈型 Agent 不是科幻。Replit 这个案例给了产品经理一个可参考的架构——不是从头训练模型，而是\"Agent + 日志数据 + 修复流水线\"。如果你的产品有用户行为数据，就可以考虑类似的闭环——Agent 观察用户怎么用的 → 发现哪里卡住了 → 自动优化。</p>\n<blockquote>\n<p>importance: 5 | category: Product | source: <a target=\"_blank\" rel=\"noopener\" href=\"https://www.saastr.com/amjad-masad-and-me-at-saastr-ai-2026-the-agents-we-actually-built-and-what-replits-founder-thinks-comes-next/\">SaaStr</a></p>\n</blockquote>\n<hr />\n<h3>3. Cursor 设计负责人 Ryo Lu：画按钮的时代，真的结束了</h3>\n<p><strong>Insight</strong>：Cursor 设计主管 Ryo Lu 提出了一个激进的观点——设计师的工作不再是画界面，而是定义\"Agent 的行为边界\"。他加入 Cursor 时公司没有一个全职设计师，但他做的第一件事不是画 UI，而是把 Cursor 五个分散的功能（Tab 补全、Command K、Chat、Composer、Agent）统一成一个 Agent 概念。据称这是 Cursor 2025 年高速增长的核心原因。</p>\n<p><strong>落地过程</strong>：Ryo 的 Design Mode 颠覆了传统设计工具的逻辑——不再是拖拽组件，而是你在浏览器里点击元素、画标注、说一句话，Agent 就帮你改好了。他自己用 Cursor 一个人写了 13 万行代码的 RyOS（基于 Web 的 Agent 操作系统）。他的核心方法论是\"把 AI 当联合创始人，不是员工\"——不写详细 spec，而是描述问题，让 Agent 一起碰撞方案。</p>\n<p><strong>对我的启发</strong>：Ryo 做的\"统一 Agent 模式\"本质上是一个产品架构决策，不是设计决策。他把五个功能合成一个，因为用户心智里不需要五个 AI 功能——只需要\"一个能帮我干活的东西\"。这对产品经理的启发：AI 产品的功能不是越多越好，把分散的 AI 能力收拢成一个统一的 Agent 入口，可能比加十个新功能更有价值。</p>\n<blockquote>\n<p>importance: 4 | category: Product | source: <a target=\"_blank\" rel=\"noopener\" href=\"https://sspai.com/post/101207\">少数派</a> · <a target=\"_blank\" rel=\"noopener\" href=\"https://zhuanlan.zhihu.com/p/2012674917578055695\">知乎</a></p>\n</blockquote>\n<hr />\n<h3>4. GitHub 本周最火项目不是模型，是\"让 AI 说话更省钱\"</h3>\n<p><strong>Insight</strong>：本周 GitHub Trending 第一不是新模型，而是一个叫 caveman 的项目（85K ⭐）——让 Claude 把输出压缩成穴居人风格，省 65% token。配合 superpowers（245K ⭐，Agent Skills 框架）和 agentskills（22K ⭐，Skills 标准化规范），三个项目指向同一个趋势：Skills 正在变成 Agent 时代的 App Store。</p>\n<p><strong>落地过程</strong>：caveman 只做一件事——把 Agent 内部通信的语言精简到极致，但用户可见的输出不变。背后是行业的集体焦虑：token 成本正在成为瓶颈。OpenAI 砍了推理价格、DeepSeek 推出峰谷计费、caveman 从语言层面压缩——三件事同时发生，说明\"成本工程\"已经是一个独立的产品方向。</p>\n<p><strong>对我的启发</strong>：对产品经理来说，这意味着两件事。一是设计 AI 产品时要考虑 token 成本——你的 prompt 设计直接决定了每次调用的成本。二是 Skills 正在成为分发单位——就像 iOS 的 App Store 让开发者不需要懂芯片就能做 app，Skills 让领域专家不需要懂 prompt engineering 就能封装自己的知识。你应该开始积累自己的 Skills，而不是手写 prompt。</p>\n<blockquote>\n<p>importance: 4 | category: Trend | source: <a target=\"_blank\" rel=\"noopener\" href=\"https://dev.to/muildev/github-trending-digest-2026-07-07-58hg\">GitHub Trending</a></p>\n</blockquote>\n<hr />\n<h3>5. OpenAI 给 Claude Code 写了个插件——生态围墙正式倒塌</h3>\n<p><strong>Insight</strong>：本周最意味深长的 GitHub 项目不是技术最强的那一个，而是 OpenAI 官方的 codex-plugin-cc（24K ⭐）——让 Claude Code 用户能在终端里直接调用 OpenAI Codex。OpenAI 亲手为竞品写插件。</p>\n<p><strong>落地过程</strong>：这背后的逻辑很简单——开发者已经住在 Claude Code 里了，OpenAI 的选择是\"加入\"而不是\"对抗\"。这验证了一个趋势：模型能力不再是护城河，用户习惯才是。谁能占领开发者的终端，谁就有分发权。OpenAI 宁愿在 Claude Code 里当\"被调用的服务\"，也不愿意赌开发者会换工具。</p>\n<p><strong>对我的启发</strong>：如果你的产品依赖某个 AI 平台，现在就要做\"模型抽象层\"。不是过度工程——OpenAI 自己都在拥抱竞品生态。同时这也是一个产品策略参考：如果你的竞品已经占领了用户心智（比如 Claude Code 是\"靠谱老员工\"），不要正面进攻，学 OpenAI 的方式——把你自己嵌入到竞品的工作流里。</p>\n<blockquote>\n<p>importance: 4 | category: Trend | source: <a target=\"_blank\" rel=\"noopener\" href=\"https://github.com/openai/codex-plugin-cc\">GitHub</a></p>\n</blockquote>\n<hr />\n<h3>6. Product Hunt 上出现了一个有意思的产品：Glaze——描述一个 app，给你一个真的桌面应用</h3>\n<p><strong>Insight</strong>：Raycast 团队做的 Glaze 不是\"AI 帮你写代码\"，而是\"你用自然语言描述想要什么 app，AI 直接在 macOS 上给你生成一个可以离线运行的真实桌面应用\"。这比传统的 AI coding 工更进一步——用户连\"看代码\"这一步都跳过了。</p>\n<p><strong>落地过程</strong>：Glaze 选择了 macOS 原生路线，生成的 app 不是网页套壳，是真的能进 Dock、能离线用。这和 Raycast 一贯的产品哲学一致——\"让用户留在桌面，不要打开浏览器\"。技术上的关键是限制了生成范围（只做桌面小工具），反而让体验非常完整。</p>\n<p><strong>对我的启发</strong>：\"用自然语言生成一个 app\"这个赛道正在从\"能做\"走向\"好用\"。Glaze 的关键选择是范围控制——不是做一个万能的 app 生成器，而是只做桌面小工具这个窄场景。这正是 Zara Zhang 说的\"从小而怪的产品出发\"——窄定位反而更容易做到极致。</p>\n<blockquote>\n<p>importance: 3 | category: Launch | source: <a target=\"_blank\" rel=\"noopener\" href=\"https://www.producthunt.com/leaderboard/daily/2026/7/6\">Product Hunt</a></p>\n</blockquote>\n<hr />\n<h2>🛠️ Products Worth Noticing</h2>\n<table>\n<thead>\n<tr>\n<th>产品</th>\n<th>为什么值得关注</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>Context.dev</strong></td>\n<td>把任意网页转成 LLM 可读的结构化上下文。如果你在做 AI 产品且需要让 LLM 理解网页内容，这个 API 可能比你自己写爬虫省十倍时间</td>\n</tr>\n<tr>\n<td><strong>Astryx</strong></td>\n<td>Meta 开源的 Agent-Ready 设计系统。这意味着大厂已经开始为\"Agent 是第一用户\"做设计了——你的产品 UI 被 Agent 读取和操作，而不仅是人类</td>\n</tr>\n<tr>\n<td><strong>caveman</strong></td>\n<td>一个 Claude Code skill，用\"穴居人话\"压缩 token 消耗 65%。看起来搞笑但背后是严肃的产品趋势——token 优化正在成为独立品类</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h2>💡 Today's Builder Insight</h2>\n<p><strong>Karpathy 和 Replit 在同一天讲了同一件事，但从相反的方向。</strong></p>\n<p>Karpathy 说\"别急着做 Agent，先把底层模型搞对\"。Replit 说\"Agent 已经在生产环境自愈了，每月成本 $257\"。表面上是矛盾的，但底层逻辑一致——两者都在说\"认真对待 Agent 的基础设施\"。</p>\n<p>Karpathy 的\"基础\"是模型层——他回到 Anthropic 预训练团队，从神经元级别做起。Replit 的\"基础\"是工程层——monorepo 让 Agent 有全局上下文、自动备份让 Agent 出错可以回滚、沙箱让 Agent 不会删生产数据库。</p>\n<p>这个矛盾恰好定义了 2026 年 AI 产品经理的核心张力——你的产品是应该在\"等模型变好\"还是\"现在就用工程手段解决问题\"？答案可能是两者都要。<strong>模型没到那一步的时候，用工程补；模型到了的时候，工程积累就是护城河。</strong></p>\n<hr />\n<h2>✅ Today's Action</h2>\n<blockquote>\n<p>打开 <a target=\"_blank\" rel=\"noopener\" href=\"https://github.com/JuliusBrussee/caveman\">caveman</a>，读一下它的 README。不是学它的代码——是学它的产品思路：<strong>只做一件事，做到极致，甚至做到搞笑</strong>。然后问自己：你的产品里有没有一个可以\"caveman 化\"的环节——砍掉 80% 的花哨功能，只留一个做到极致的点？</p>\n</blockquote>\n<hr />\n<p><em>AI Builder Daily · 每日 08:30 更新 · Follow builders, not influencers.</em></p>"}];
var currentDate = null;

function renderNav() {
    var nav = document.getElementById('nav-links');
    reports.forEach(function(r) {
        var a = document.createElement('a');
        a.href = '#';
        a.textContent = r.date;
        a.onclick = function(e) { e.preventDefault(); showReport(r.date); };
        nav.appendChild(a);
    });
}

function showReport(date) {
    var report = reports.find(function(r) { return r.date === date; });
    if (!report) return;
    currentDate = date;

    document.getElementById('content').innerHTML = report.html;

    // Highlight active nav
    var links = document.querySelectorAll('nav a');
    links.forEach(function(a) {
        a.classList.toggle('active', a.textContent === date);
    });
}

// Show latest report on load
renderNav();
if (reports.length > 0) {
    showReport(reports[0].date);
}
</script>
